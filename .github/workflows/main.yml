name: github-contribution-grid-snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate contribution snake
        uses: github-contribution-grid-snake/action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: "default"
